global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'tender-nodes'
    static_configs:
      - targets: ['validator1:9100','validator2:9100','validator3:9100','validator4:9100','validator5:9100','validator6:9100','validator7:9100','sentry1:9100','sentry2:9100','sentry3:9100','rpc1:9100','rpc2:9100']
