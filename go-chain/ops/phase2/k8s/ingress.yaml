apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tender-rpc-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tender-rpc
            port:
              number: 80
