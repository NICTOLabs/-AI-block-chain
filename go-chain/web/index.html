<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDR Blockchain Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', monospace; background: #0a0e27; color: #e0e0e0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: #00d4ff; text-align: center; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1f3a; border: 1px solid #00d4ff; border-radius: 8px; padding: 20px; }
        .stat-label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
        .stat-value { color: #00d4ff; font-size: 1.8em; font-weight: bold; }
        .section { background: #1a1f3a; border: 1px solid #00d4ff; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .section h2 { color: #00d4ff; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #00d4ff; font-weight: 600; }
        tr:hover { background: #252a4a; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; }
        .badge-success { background: #28a745; color: white; }
        .badge-info { background: #17a2b8; color: white; }
        .loading { text-align: center; color: #888; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 TDR Blockchain Explorer</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Block Height</div>
                <div class="stat-value" id="height">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Transactions</div>
                <div class="stat-value" id="pending">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Token Supply</div>
                <div class="stat-value" id="supply">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Peers</div>
                <div class="stat-value" id="peers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Consensus</div>
                <div class="stat-value" id="consensus">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Genesis Finalized</div>
                <div class="stat-value" id="genesis">-</div>
            </div>
        </div>

        <div class="section">
            <h2>📦 Latest Blocks</h2>
            <table>
                <thead>
                    <tr><th>Height</th><th>Hash</th><th>Author</th><th>Time</th><th>Transactions</th></tr>
                </thead>
                <tbody id="blocks-table">
                    <tr><td colspan="5" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>💸 Pending Transactions</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>From</th><th>To</th><th>Amount</th><th>Fee</th><th>Type</th></tr>
                </thead>
                <tbody id="tx-table">
                    <tr><td colspan="6" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = window.TDR_API || 'http://localhost:8080';
        
        function formatTender(amount) {
            amount = Number(amount || 0);
            const tender = Math.floor(amount / 10000000);
            const hogohogo = amount % 10000000;
            return tender + ' TENDER ' + String(hogohogo).padStart(7, '0') + ' HOGOHOGO';
        }
        
        async function fetchJSON(path) {
            const res = await fetch(API + path);
            if (!res.ok) throw new Error('Failed: ' + path);
            return res.json();
        }

        async function loadStats() {
            try {
                const data = await fetchJSON('/api/monitoring');
                document.getElementById('height').textContent = data.height || 0;
                document.getElementById('pending').textContent = data.pending_transactions || 0;
                document.getElementById('supply').textContent = formatTender(data.token_supply || 0);
                document.getElementById('peers').textContent = data.peer_count || 0;
                document.getElementById('consensus').textContent = data.consensus || '-';
            } catch (e) {
                console.error('Stats failed:', e);
            }
        }

        async function loadBlocks() {
            try {
                const data = await fetchJSON('/api/chain');
                const blocks = (data.chain || []).slice(-10).reverse();
                const tbody = document.getElementById('blocks-table');
                if (!blocks.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="loading">No blocks</td></tr>';
                    return;
                }
                tbody.innerHTML = blocks.map(b => `
                    <tr>
                        <td>${b.index || b.Index}</td>
                        <td><code>${(b.block_hash || b.BlockHash || '').slice(0, 16)}...</code></td>
                        <td>${b.author || b.Author || '-'}</td>
                        <td>${new Date((b.timestamp || b.Timestamp || 0) * 1000).toLocaleString()}</td>
                        <td><span class="badge badge-info">${(b.transactions || b.Transactions || []).length}</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Blocks failed:', e);
            }
        }

        async function loadMempool() {
            try {
                const txs = await fetchJSON('/api/mempool');
                const tbody = document.getElementById('tx-table');
                const pending = (txs.pending || txs || []).slice(0, 20);
                if (!pending.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="loading">No pending transactions</td></tr>';
                    return;
                }
                tbody.innerHTML = pending.map(tx => `
                    <tr>
                        <td><code>${(tx.id || tx.ID || '').slice(0, 16)}...</code></td>
                        <td><code>${(tx.from || tx.From || '').slice(0, 16)}...</code></td>
                        <td><code>${(tx.to || tx.To || '').slice(0, 16)}...</code></td>
                        <td>${formatTender(tx.amount || tx.Amount || 0)}</td>
                        <td>${formatTender(tx.fee || tx.Fee || 0)}</td>
                        <td><span class="badge badge-success">${tx.tx_type || tx.TxType || '-'}</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Mempool failed:', e);
            }
        }

        loadStats();
        loadBlocks();
        loadMempool();
        setInterval(() => { loadStats(); loadBlocks(); loadMempool(); }, 5000);
    </script>
</body>
</html>
