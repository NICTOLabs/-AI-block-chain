openapi: 3.0.3
info:
  title: TENDER Blockchain API
  version: 0.2.0
paths:
  /api/chain:
    get:
      summary: Latest chain blocks
  /api/mempool:
    get:
      summary: Pending transactions
  /api/monitoring:
    get:
      summary: Node metrics and chain summary
  /api/blocks/{height}:
    get:
      summary: Block by height
      parameters:
        - in: path
          name: height
          required: true
          schema:
            type: integer
  /api/tx/{id}:
    get:
      summary: Transaction by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
  /api/wallet:
    get:
      summary: Wallet management status
  /api/faucet:
    post:
      summary: Request testnet funds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
