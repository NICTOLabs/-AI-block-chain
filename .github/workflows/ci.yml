name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [1.22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: cd go-chain && go build ./...
      - run: cd go-chain && go vet ./...
      - run: cd go-chain && go test -count=1 -timeout 300s ./api/...
      - run: cd go-chain && go test -count=1 -timeout 300s -short -run 'TestEstimateFee|TestSlash|TestMintingPause|TestFeeBurn|TestMineBlockIncludes|TestMinting|TestReq|TestMaxBody|TestIdempotency|TestRateLimiter|TestRequireAuth' . ./blockchain/... ./api/...
